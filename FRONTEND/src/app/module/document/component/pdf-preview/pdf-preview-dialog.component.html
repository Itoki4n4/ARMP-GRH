<div class="preview-container">
    <div class="preview-header">
        <div class="title-section">
            <mat-icon color="primary">picture_as_pdf</mat-icon>
            <h2>{{ data.title || 'Aperçu du Document' }}</h2>
        </div>
        <div class="actions">
            <button mat-raised-button color="primary" (click)="download()" ext-access>
                <mat-icon>download</mat-icon>
                Télécharger
            </button>
            <button mat-icon-button (click)="close()">
                <mat-icon>close</mat-icon>
            </button>
        </div>
    </div>

    <mat-divider></mat-divider>

    <div class="preview-body">
        <div *ngIf="loading" class="loading-overlay">
            <mat-spinner diameter="50"></mat-spinner>
            <p>Chargement de l'aperçu...</p>
        </div>

        <iframe *ngIf="pdfUrl" [src]="pdfUrl" frameborder="0" width="100%" height="100%"></iframe>

        <div *ngIf="!loading && !pdfUrl" class="error-preview">
            <mat-icon color="warn">error</mat-icon>
            <p>Impossible d'afficher l'aperçu.</p>
            <button mat-stroked-button color="warn" (click)="download()">
                Télécharger directement le fichier
            </button>
        </div>
    </div>
</div>
