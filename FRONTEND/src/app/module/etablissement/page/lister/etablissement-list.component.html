<div class="lister-etablissements-container">
    <div class="header-section">
        <h1>
            <mat-icon>business</mat-icon>
            Établissements
        </h1>
        <button mat-raised-button color="primary" (click)="openCreate()">
            <mat-icon>add</mat-icon>
            Nouvel Établissement
        </button>
    </div>

    <div *ngIf="loading" class="loading-container">
        <mat-spinner></mat-spinner>
        <p>Chargement des établissements...</p>
    </div>

    <div *ngIf="errorMessage" class="error-message">
        <mat-icon>error</mat-icon>
        {{ errorMessage }}
    </div>

    <mat-card *ngIf="!loading && !errorMessage">
        <table mat-table [dataSource]="etablissements" class="etablissements-table">
            <ng-container matColumnDef="etab_code">
                <th mat-header-cell *matHeaderCellDef>Code</th>
                <td mat-cell *matCellDef="let e">
                    <span class="code-highlight">{{ e.etab_code }}</span>
                </td>
            </ng-container>

            <ng-container matColumnDef="etab_nom">
                <th mat-header-cell *matHeaderCellDef>Nom</th>
                <td mat-cell *matCellDef="let e" style="font-weight: 600; color: #1e293b;">{{ e.etab_nom }}</td>
            </ng-container>

            <ng-container matColumnDef="etab_adresse">
                <th mat-header-cell *matHeaderCellDef>Adresse</th>
                <td mat-cell *matCellDef="let e">
                    <span class="status-badge info" style="background-color: #f1f5f9; color: #475569;">
                        <mat-icon style="font-size: 14px; width: 14px; height: 14px;">location_on</mat-icon>
                        {{ e.etab_adresse || 'N/A' }}
                    </span>
                </td>
            </ng-container>


            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Actions</th>
                <td mat-cell *matCellDef="let e">
                    <button mat-icon-button color="accent" (click)="openEdit(e)">
                        <mat-icon>edit</mat-icon>
                    </button>
                    <button mat-icon-button color="warn" (click)="onDelete(e)">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        <div *ngIf="etablissements.length === 0" class="no-data">
            <mat-icon>inbox</mat-icon>
            <p>Aucun établissement trouvé</p>
        </div>
    </mat-card>
</div>
